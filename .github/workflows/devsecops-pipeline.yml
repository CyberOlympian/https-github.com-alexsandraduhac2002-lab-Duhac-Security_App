name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-and-tests:
    name: Dependency Scan and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Dependency vulnerability scan
        shell: bash
        run: |
          if grep -vE '^[[:space:]]*(#|$)' requirements.txt >/dev/null 2>&1; then
            pip-audit -r requirements.txt
          else
            echo "No third-party dependencies declared; nothing to audit."
          fi

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  build-and-scan:
    name: Container Build and Scan
    needs: security-and-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Build container image
        run: docker build -t secure-app:${{ github.sha }} .

      - name: Container vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: secure-app:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy:
    name: Deployment
    needs: build-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: demo
    steps:
      - name: Confirm deployment
        run: |
          echo "Deployment completed successfully to the demo environment."